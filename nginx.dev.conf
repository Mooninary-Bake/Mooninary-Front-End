worker_processes 1;

events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip to improve performance
    gzip on;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml;

    server {
        listen       8080;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        # Proxy API requests to backend
        location /api {
            client_max_body_size 500M;

            proxy_pass https://dls-be-dev.hikarimoon.pro;
            proxy_set_header Host dls-be-dev.hikarimoon.pro;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Fix SSL Handshake Failure (Alert 40) - Required for SNI (e.g. Cloudflare)
            proxy_ssl_server_name on;
            proxy_ssl_name dls-be-dev.hikarimoon.pro;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # Support long-running requests if needed
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
        }

        # Serve static files directly
        location / {
            try_files $uri /index.html;
        }

        # Optional: cache static assets
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public";
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}